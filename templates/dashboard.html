{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Dashboard</h2>

    <canvas id="chart"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: {
                labels: {{ names | safe }},
                datasets: [{
                    label: 'Attendance %',
                    data: {{ percentages | safe }}
                }]
            }
        });
    </script>
</div>
{% endblock %}
